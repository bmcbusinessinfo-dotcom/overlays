<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live - Primos Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --negro:     #060810;
    --azul-glow: #1a6fff;
    --cyan:      #00e5ff;
    --verde:     #00ff88;
    --rojo:      #ff2244;
    --blanco:    #e8f4ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; color: var(--blanco); font-family: 'Rajdhani', sans-serif; }

  .intro-wipe { position: fixed; inset: 0; z-index: 999; background: var(--negro); transform-origin: right; animation: introWipe 0.9s cubic-bezier(0.86,0,0.07,1) forwards; }
  .intro-flash { position: fixed; inset: 0; z-index: 998; background: white; opacity: 0; animation: introFlash 0.4s ease-out 0.05s forwards; }
  .intro-glitch { position: fixed; inset: 0; z-index: 997; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,136,0.12) 3px, rgba(0,255,136,0.12) 4px); opacity: 0; animation: introGlitch 0.8s ease-out forwards; }
  @keyframes introWipe { 0% { transform: scaleX(1); } 100% { transform: scaleX(0); } }
  @keyframes introFlash { 0% { opacity: 0; } 25% { opacity: 0.4; } 100% { opacity: 0; } }
  @keyframes introGlitch { 0% { opacity: 0.8; transform: translateX(8px); } 20% { transform: translateX(-6px); } 40% { opacity: 0.4; transform: translateX(3px); } 100% { opacity: 0; transform: translateX(0); } }

  .reveal { opacity: 0; animation: revealUp 0.6s ease-out forwards; }
  .reveal-1 { animation-delay: 0.85s; }
  .reveal-2 { animation-delay: 1.0s; }
  .reveal-3 { animation-delay: 1.1s; }
  .reveal-4 { animation-delay: 1.2s; }
  @keyframes revealUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* BARRA SUPERIOR */
  .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 8vh; min-height: 55px; background: linear-gradient(180deg, rgba(6,8,16,0.92) 0%, transparent 100%); display: flex; align-items: center; padding: 0 3vw; gap: 1.5vw; }
  .live-badge { display: flex; align-items: center; gap: 8px; background: var(--rojo); border-radius: 4px; padding: 3px 12px; flex-shrink: 0; }
  .live-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: white; animation: liveDotBlink 1s ease-in-out infinite; }
  @keyframes liveDotBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .live-badge-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(14px, 1.5vw, 22px); color: white; letter-spacing: 3px; }
  .top-logo { width: 5vh; height: 5vh; min-width: 36px; min-height: 36px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 12px rgba(0,255,136,0.25); flex-shrink: 0; }
  .top-brand { font-family: 'Bebas Neue', sans-serif; font-size: clamp(16px, 2vw, 28px); letter-spacing: 4px; color: var(--blanco); white-space: nowrap; }
  .top-brand span { color: var(--verde); }
  .top-spacer { flex: 1; }
  .top-platform { font-family: 'Share Tech Mono', monospace; font-size: clamp(9px, 0.9vw, 14px); letter-spacing: 2px; color: var(--cyan); opacity: 0.7; white-space: nowrap; }
  .top-line { position: absolute; top: 8vh; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--rojo) 20%, var(--cyan) 50%, var(--verde) 80%, transparent); opacity: 0.5; }

  /* BARRA INFERIOR */
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 8vh; min-height: 55px; background: linear-gradient(0deg, rgba(6,8,16,0.95) 0%, transparent 100%); display: flex; align-items: center; padding: 0 3vw; gap: 1.5vw; }
  .bottom-line { position: absolute; bottom: 8vh; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--verde) 20%, var(--cyan) 50%, var(--rojo) 80%, transparent); opacity: 0.4; }
  .ticker-label { font-family: 'Share Tech Mono', monospace; font-size: clamp(9px, 0.8vw, 13px); letter-spacing: 3px; color: var(--cyan); opacity: 0.6; white-space: nowrap; }
  .ticker-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
  .ticker-text { font-family: 'Rajdhani', sans-serif; font-size: clamp(12px, 1.4vw, 20px); font-weight: 600; color: var(--blanco); flex: 1; overflow: hidden; white-space: nowrap; }
  .ticker-channel { font-family: 'Share Tech Mono', monospace; font-size: clamp(9px, 0.8vw, 14px); letter-spacing: 2px; color: var(--verde); opacity: 0.8; white-space: nowrap; }

  /* ESQUINAS */
  .corner { position: absolute; width: 3.5vw; height: 3.5vw; min-width: 36px; min-height: 36px; }
  .corner::before, .corner::after { content: ''; position: absolute; }
  .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
  .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
  .corner.tl { top: 9vh; left: 1.5vw; }
  .corner.tl::before, .corner.tl::after { background: var(--verde); box-shadow: 0 0 6px var(--verde); opacity: 0.6; }
  .corner.br { bottom: 9vh; right: 1.5vw; transform: scale(-1); }
  .corner.br::before, .corner.br::after { background: var(--verde); box-shadow: 0 0 6px var(--verde); opacity: 0.6; }
  .corner.tr { top: 9vh; right: 1.5vw; transform: scaleX(-1); }
  .corner.tr::before, .corner.tr::after { background: var(--rojo); box-shadow: 0 0 6px var(--rojo); opacity: 0.6; }
  .corner.bl { bottom: 9vh; left: 1.5vw; transform: scaleY(-1); }
  .corner.bl::before, .corner.bl::after { background: var(--rojo); box-shadow: 0 0 6px var(--rojo); opacity: 0.6; }

  /* INDICADOR LATERAL */
  .side-status { position: absolute; left: 2vw; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .side-pip { width: 4px; height: 4px; border-radius: 50%; opacity: 0.3; }
  .side-pip.g { background: var(--verde); }
  .side-pip.r { background: var(--rojo); }
  .side-pip.on { opacity: 1; animation: dotPulse 2s ease-in-out infinite; }
  .side-pip.on.g { box-shadow: 0 0 6px var(--verde); }
  .side-pip.on.r { box-shadow: 0 0 6px var(--rojo); }
  @keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="intro-wipe"></div>
<div class="intro-flash"></div>
<div class="intro-glitch"></div>

<div class="top-bar reveal reveal-1">
  <div class="live-badge"><div class="live-badge-dot"></div><div class="live-badge-text">EN VIVO</div></div>
  <img class="top-logo" src="https://raw.githubusercontent.com/bmcbusinessinfo-dotcom/overlays/main/Logo%20circular.png" alt="PL">
  <div class="top-brand">Primos<span>Life</span></div>
  <div class="top-spacer"></div>
  <div class="top-platform">kick.com/PrimosLife</div>
</div>
<div class="top-line reveal reveal-1"></div>

<div class="bottom-line reveal reveal-4"></div>
<div class="bottom-bar reveal reveal-4">
  <div class="ticker-label">▸ IRL</div>
  <div class="ticker-divider"></div>
  <div class="ticker-text">Primos Life — Streaming en vivo desde las calles 🎥</div>
  <div class="ticker-divider"></div>
  <div class="ticker-channel">@PrimosLife</div>
</div>

<div class="corner tl reveal reveal-2"></div>
<div class="corner tr reveal reveal-2"></div>
<div class="corner bl reveal reveal-3"></div>
<div class="corner br reveal reveal-3"></div>

<div class="side-status reveal reveal-2">
  <div class="side-pip g on"></div>
  <div class="side-pip g"></div>
  <div class="side-pip r"></div>
  <div class="side-pip r on"></div>
  <div class="side-pip g"></div>
  <div class="side-pip r on"></div>
</div>

</body>
</html>
