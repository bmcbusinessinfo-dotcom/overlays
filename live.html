<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Live - Los Brothers Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root {
    --negro:     #060810;
    --azul:      #0a2fff;
    --azul-glow: #1a6fff;
    --cyan:      #00e5ff;
    --verde:     #00ff88;
    --rojo:      #ff2244;
    --blanco:    #e8f4ff;
    --gris:      #4a5568;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    /* fondo transparente: el video del streamer se ve debajo */
    background: transparent;
    color: var(--blanco);
    font-family: 'Rajdhani', sans-serif;
  }

  /* ══════════════════════════════════════
     ANIMACIÓN DE ENTRADA
     La pantalla "arranca" con un wipe + flash
     que conecta visualmente con la salida del starting
  ══════════════════════════════════════ */
  .intro-wipe {
    position: fixed; inset: 0; z-index: 999;
    background: var(--negro);
    transform-origin: right;
    animation: introWipe 0.9s cubic-bezier(0.86,0,0.07,1) forwards;
  }
  .intro-flash {
    position: fixed; inset: 0; z-index: 998;
    background: white; opacity: 0;
    animation: introFlash 0.4s ease-out 0.05s forwards;
  }
  .intro-glitch {
    position: fixed; inset: 0; z-index: 997;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,255,136,0.12) 3px, rgba(0,255,136,0.12) 4px
    );
    opacity: 0;
    animation: introGlitch 0.8s ease-out forwards;
  }

  @keyframes introWipe {
    0%   { transform: scaleX(1); }
    100% { transform: scaleX(0); }
  }
  @keyframes introFlash {
    0%   { opacity: 0; }
    25%  { opacity: 0.4; }
    100% { opacity: 0; }
  }
  @keyframes introGlitch {
    0%   { opacity: 0.8; transform: translateX(8px); }
    20%  {               transform: translateX(-6px); }
    40%  { opacity: 0.4; transform: translateX(3px); }
    100% { opacity: 0;   transform: translateX(0); }
  }

  /* Los elementos del overlay se revelan con delay
     para que aparezcan justo cuando el wipe termina */
  .reveal { opacity: 0; animation: revealUp 0.6s ease-out forwards; }
  .reveal-1 { animation-delay: 0.85s; }
  .reveal-2 { animation-delay: 1.0s; }
  .reveal-3 { animation-delay: 1.1s; }
  .reveal-4 { animation-delay: 1.2s; }

  @keyframes revealUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════════
     BARRA SUPERIOR (branding)
  ══════════════════════════════════════ */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 72px;
    background: linear-gradient(180deg, rgba(6,8,16,0.92) 0%, transparent 100%);
    display: flex; align-items: center;
    padding: 0 40px;
    gap: 20px;
  }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--rojo); border-radius: 4px;
    padding: 4px 12px;
  }
  .live-badge-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: white;
    animation: liveDotBlink 1s ease-in-out infinite;
  }
  @keyframes liveDotBlink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  .live-badge-text {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    color: white; letter-spacing: 3px;
  }

  .top-brand {
    font-family: 'Bebas Neue', sans-serif; font-size: 24px;
    letter-spacing: 4px; color: var(--blanco);
  }
  .top-brand span { color: var(--verde); }

  .top-spacer { flex: 1; }

  .top-platform {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    letter-spacing: 2px; color: var(--cyan); opacity: 0.7;
  }

  /* Línea bajo top-bar */
  .top-line {
    position: absolute; top: 72px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--rojo) 20%, var(--cyan) 50%, var(--verde) 80%, transparent);
    opacity: 0.5;
  }

  /* ══════════════════════════════════════
     BARRA INFERIOR (info + canal)
  ══════════════════════════════════════ */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 68px;
    background: linear-gradient(0deg, rgba(6,8,16,0.95) 0%, transparent 100%);
    display: flex; align-items: center;
    padding: 0 40px; gap: 16px;
  }

  .bottom-line {
    position: absolute; bottom: 68px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--verde) 20%, var(--cyan) 50%, var(--rojo) 80%, transparent);
    opacity: 0.4;
  }

  .ticker-label {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 3px; color: var(--cyan); opacity: 0.6;
    white-space: nowrap;
  }
  .ticker-divider {
    width: 1px; height: 24px;
    background: rgba(255,255,255,0.12);
  }
  .ticker-text {
    font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 600;
    color: var(--blanco); letter-spacing: 1px;
    flex: 1; overflow: hidden; white-space: nowrap;
  }
  .ticker-channel {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    letter-spacing: 2px; color: var(--verde); opacity: 0.8;
    white-space: nowrap;
  }

  /* ══════════════════════════════════════
     ESQUINAS
  ══════════════════════════════════════ */
  .corner { position: absolute; width: 50px; height: 50px; }
  .corner::before, .corner::after { content: ''; position: absolute; }
  .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
  .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }

  .corner.tl { top: 80px; left: 20px; }
  .corner.tl::before, .corner.tl::after { background: var(--verde); box-shadow: 0 0 6px var(--verde); opacity: 0.6; }

  .corner.br { bottom: 76px; right: 20px; transform: scale(-1); }
  .corner.br::before, .corner.br::after { background: var(--verde); box-shadow: 0 0 6px var(--verde); opacity: 0.6; }

  .corner.tr { top: 80px; right: 20px; transform: scaleX(-1); }
  .corner.tr::before, .corner.tr::after { background: var(--rojo); box-shadow: 0 0 6px var(--rojo); opacity: 0.6; }

  .corner.bl { bottom: 76px; left: 20px; transform: scaleY(-1); }
  .corner.bl::before, .corner.bl::after { background: var(--rojo); box-shadow: 0 0 6px var(--rojo); opacity: 0.6; }

  /* ══════════════════════════════════════
     PANEL DE CHAT (derecha)
     — placeholder hasta integrar widget real
  ══════════════════════════════════════ */
  .chat-panel {
    position: absolute; right: 28px; top: 90px; bottom: 86px;
    width: 300px;
    background: rgba(6,8,16,0.65);
    border: 1px solid rgba(0,229,255,0.08);
    border-radius: 6px;
    display: flex; flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(4px);
  }
  .chat-header {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-header-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--verde); box-shadow: 0 0 6px var(--verde);
    animation: liveDotBlink 1.5s ease-in-out infinite;
  }
  .chat-header-text {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 2px; color: var(--cyan); opacity: 0.7;
    text-transform: uppercase;
  }
  .chat-messages {
    flex: 1; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px; justify-content: flex-end;
    overflow: hidden;
  }
  .chat-msg { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .chat-msg .name { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; margin-bottom: 1px; }
  .chat-msg .text { color: rgba(232,244,255,0.85); }
  .chat-msg.verde .name { color: var(--verde); }
  .chat-msg.rojo  .name { color: var(--rojo); }
  .chat-msg.cyan  .name { color: var(--cyan); }

  /* ══════════════════════════════════════
     INDICADOR DE ESTADO (izquierda)
  ══════════════════════════════════════ */
  .side-status {
    position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 6px; align-items: center;
  }
  .side-pip {
    width: 4px; height: 4px; border-radius: 50%; opacity: 0.3;
  }
  .side-pip.g { background: var(--verde); }
  .side-pip.r { background: var(--rojo); }
  .side-pip.on { opacity: 1; animation: dotPulse 2s ease-in-out infinite; }
  .side-pip.on.g { box-shadow: 0 0 6px var(--verde); }
  .side-pip.on.r { box-shadow: 0 0 6px var(--rojo); }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<!-- Animación de entrada: wipe + flash + glitch -->
<div class="intro-wipe"></div>
<div class="intro-flash"></div>
<div class="intro-glitch"></div>

<!-- Barra superior -->
<div class="top-bar reveal reveal-1">
  <div class="live-badge">
    <div class="live-badge-dot"></div>
    <div class="live-badge-text">EN VIVO</div>
  </div>
  <div class="top-brand">Los Brothers<span>Life</span></div>
  <div class="top-spacer"></div>
  <div class="top-platform">kick.com/losbortherslife</div>
</div>
<div class="top-line reveal reveal-1"></div>

<!-- Barra inferior -->
<div class="bottom-line reveal reveal-4"></div>
<div class="bottom-bar reveal reveal-4">
  <div class="ticker-label">▸ IRL</div>
  <div class="ticker-divider"></div>
  <div class="ticker-text" id="ticker">Los Brothers Life — Streaming en vivo desde las calles 🎥</div>
  <div class="ticker-divider"></div>
  <div class="ticker-channel">@LosBrothersLife</div>
</div>

<!-- Esquinas -->
<div class="corner tl reveal reveal-2"></div>
<div class="corner tr reveal reveal-2"></div>
<div class="corner bl reveal reveal-3"></div>
<div class="corner br reveal reveal-3"></div>

<!-- Indicadores laterales -->
<div class="side-status reveal reveal-2">
  <div class="side-pip g on"></div>
  <div class="side-pip g"></div>
  <div class="side-pip r"></div>
  <div class="side-pip r on"></div>
  <div class="side-pip g"></div>
  <div class="side-pip r on"></div>
</div>

<!-- Panel de chat — vacío, el widget real de Streamlabs va encima como Browser Source -->
<div class="chat-panel reveal reveal-3">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <div class="chat-header-text">Chat en vivo</div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
</div>

<script>
</script>
</body>
</html>
