<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat - Primos Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  PRIMOS LIFE — chat.html                                     ║
  ║  Conecta al chat de Kick vía WebSocket (Pusher)              ║
  ║                                                              ║
  ║  URL para Moblin:                                            ║
  ║  https://bmcbusinessinfo-dotcom.github.io/overlays/chat.html ║
  ║                                                              ║
  ║  Agrega como Browser Source en la escena que quieras.        ║
  ║  Tamaño recomendado en Moblin: 300×800px                     ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<style>
  :root {
    --negro:  #060810;
    --verde:  #00ff88;
    --rojo:   #ff2244;
    --cyan:   #00e5ff;
    --azul:   #1a6fff;
    --blanco: #e8f4ff;
    --gris:   #4a5568;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── CONTENEDOR PRINCIPAL ── */
  #chat-wrap {
    width: 300px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── HEADER ── */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(6,8,16,0.75);
    border-bottom: 1px solid rgba(0,229,255,0.08);
    border-radius: 6px 6px 0 0;
    flex-shrink: 0;
  }

  .chat-header-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--verde);
    box-shadow: 0 0 6px var(--verde);
    animation: blink 1.5s ease-in-out infinite;
  }

  .chat-header-dot.offline {
    background: var(--gris);
    box-shadow: none;
    animation: none;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

  .chat-header-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--cyan);
    opacity: 0.7;
    text-transform: uppercase;
    flex: 1;
  }

  .chat-header-logo {
    width: 22px; height: 22px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.8;
  }

  /* Línea de color bajo el header */
  .chat-header-line {
    height: 1px;
    background: linear-gradient(90deg, var(--rojo), var(--cyan), var(--verde));
    opacity: 0.4;
    flex-shrink: 0;
  }

  /* ── LISTA DE MENSAJES ── */
  #chat-messages {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 2px;
    padding: 8px 0;
    position: relative;
  }

  /* ── MENSAJE ── */
  .msg {
    padding: 5px 12px;
    border-radius: 3px;
    opacity: 0;
    transform: translateY(12px);
    animation: msgIn 0.35s ease-out forwards;
    line-height: 1.35;
    word-break: break-word;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg:hover {
    background: rgba(255,255,255,0.03);
  }

  .msg-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .msg-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(232,244,255,0.88);
    letter-spacing: 0.3px;
  }

  /* Colores rotativos para nombres */
  .msg:nth-child(6n+1) .msg-name { color: var(--verde); }
  .msg:nth-child(6n+2) .msg-name { color: var(--cyan); }
  .msg:nth-child(6n+3) .msg-name { color: #ff8844; }
  .msg:nth-child(6n+4) .msg-name { color: var(--rojo); }
  .msg:nth-child(6n+5) .msg-name { color: #aa88ff; }
  .msg:nth-child(6n+0) .msg-name { color: var(--azul); }

  /* Suscriptor — borde izquierdo cyan */
  .msg.sub {
    border-left: 2px solid var(--cyan);
    padding-left: 10px;
  }

  /* Moderador — borde izquierdo verde */
  .msg.mod {
    border-left: 2px solid var(--verde);
    padding-left: 10px;
  }

  /* ── ESTADO DE CONEXIÓN ── */
  #status-bar {
    padding: 6px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gris);
    text-transform: uppercase;
    text-align: center;
    flex-shrink: 0;
    background: rgba(6,8,16,0.5);
    border-radius: 0 0 6px 6px;
    transition: color 0.3s;
  }

  #status-bar.conectado { color: var(--verde); opacity: 0.6; }
  #status-bar.error     { color: var(--rojo);  opacity: 0.8; }
  #status-bar.conectando { color: var(--cyan); opacity: 0.6; }
</style>
</head>
<body>

<div id="chat-wrap">

  <div class="chat-header">
    <div class="chat-header-dot" id="header-dot"></div>
    <div class="chat-header-text">Chat en vivo</div>
    <img class="chat-header-logo"
      src="https://raw.githubusercontent.com/bmcbusinessinfo-dotcom/overlays/main/Logo%20circular.png"
      alt="PL">
  </div>

  <div class="chat-header-line"></div>

  <div id="chat-messages"></div>

  <div id="status-bar" class="conectando">▸ Conectando...</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pusher/8.3.0/pusher.min.js"></script>
<script>
/* ══════════════════════════════════════
   CONFIGURACIÓN
══════════════════════════════════════ */
const CANAL_KICK  = 'primoslife';   // tu canal en Kick (minúsculas)
const MAX_MSGS    = 18;             // máximo de mensajes visibles
const FADE_OLD    = true;           // los mensajes viejos se desvanecen

/* ══════════════════════════════════════
   ELEMENTOS DOM
══════════════════════════════════════ */
const messagesEl = document.getElementById('chat-messages');
const statusEl   = document.getElementById('status-bar');
const dotEl      = document.getElementById('header-dot');

/* ══════════════════════════════════════
   ESTADO
══════════════════════════════════════ */
let channelId   = null;
let pusher      = null;
let reconnectTimer = null;
let msgCount    = 0;

/* ══════════════════════════════════════
   COLORES DE NOMBRES — hash del username
   Mismo usuario siempre mismo color
══════════════════════════════════════ */
const NAME_COLORS = [
  '#00ff88', '#00e5ff', '#ff8844',
  '#ff2244', '#aa88ff', '#1a6fff'
];

function colorParaNombre(nombre) {
  let hash = 0;
  for (let i = 0; i < nombre.length; i++) {
    hash = nombre.charCodeAt(i) + ((hash << 5) - hash);
  }
  return NAME_COLORS[Math.abs(hash) % NAME_COLORS.length];
}

/* ══════════════════════════════════════
   AGREGAR MENSAJE AL CHAT
══════════════════════════════════════ */
function agregarMensaje(nombre, texto, roles = []) {
  const div = document.createElement('div');
  div.className = 'msg';

  /* Roles especiales */
  if (roles.includes('moderator') || roles.includes('mod')) div.classList.add('mod');
  if (roles.includes('subscriber') || roles.includes('sub')) div.classList.add('sub');

  /* Nombre */
  const nameEl = document.createElement('div');
  nameEl.className = 'msg-name';
  nameEl.textContent = nombre;
  nameEl.style.color = colorParaNombre(nombre);

  /* Texto */
  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  textEl.textContent = texto;

  div.appendChild(nameEl);
  div.appendChild(textEl);
  messagesEl.appendChild(div);
  msgCount++;

  /* Limitar número de mensajes */
  while (messagesEl.children.length > MAX_MSGS) {
    messagesEl.removeChild(messagesEl.firstChild);
  }

  /* Desvanecer mensajes más viejos */
  if (FADE_OLD) {
    const msgs = messagesEl.querySelectorAll('.msg');
    msgs.forEach((m, i) => {
      const age = msgs.length - 1 - i;
      m.style.opacity = age < 3  ? '1' :
                        age < 6  ? '0.7' :
                        age < 10 ? '0.45' :
                                   '0.2';
    });
  }
}

/* ══════════════════════════════════════
   ESTADO UI
══════════════════════════════════════ */
function setStatus(estado, texto) {
  statusEl.className = estado;
  statusEl.textContent = texto;
  dotEl.className = 'chat-header-dot' + (estado === 'conectado' ? '' : ' offline');
}

/* ══════════════════════════════════════
   PASO 1 — Obtener Channel ID de Kick
══════════════════════════════════════ */
async function obtenerChannelId() {
  try {
    /* Kick no tiene CORS abierta, usamos un proxy público */
    const res = await fetch(
      `https://corsproxy.io/?https://kick.com/api/v1/channels/${CANAL_KICK}`
    );
    if (!res.ok) throw new Error('Canal no encontrado');
    const data = await res.json();
    return data.id;
  } catch (e) {
    console.error('Error obteniendo channel ID:', e);
    return null;
  }
}

/* ══════════════════════════════════════
   PASO 2 — Conectar a Pusher de Kick
══════════════════════════════════════ */
function conectarPusher(channelId) {
  /* Credenciales públicas de Kick para Pusher */
  pusher = new Pusher('eb1d5f283081a78b932c', {
    cluster: 'us2',
    forceTLS: true,
  });

  const channel = pusher.subscribe(`chatrooms.${channelId}.v2`);

  channel.bind('App\\Events\\ChatMessageEvent', (data) => {
    try {
      const nombre = data.sender?.username || data.data?.sender?.username || 'Anon';
      const texto  = data.content          || data.data?.content          || '';
      const roles  = data.sender?.identity?.badges?.map(b => b.type) || [];

      if (texto.trim()) agregarMensaje(nombre, texto, roles);
    } catch (e) {
      console.error('Error parseando mensaje:', e);
    }
  });

  pusher.connection.bind('connected', () => {
    setStatus('conectado', '▸ En vivo · primoslife');
  });

  pusher.connection.bind('disconnected', () => {
    setStatus('error', '▸ Desconectado — reconectando...');
    scheduleReconnect();
  });

  pusher.connection.bind('error', () => {
    setStatus('error', '▸ Error de conexión');
    scheduleReconnect();
  });
}

/* ══════════════════════════════════════
   RECONEXIÓN AUTOMÁTICA
══════════════════════════════════════ */
function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (pusher) { pusher.disconnect(); pusher = null; }
    init();
  }, 8000);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
async function init() {
  setStatus('conectando', '▸ Conectando...');

  channelId = await obtenerChannelId();

  if (!channelId) {
    setStatus('error', '▸ Canal no encontrado');
    scheduleReconnect();
    return;
  }

  conectarPusher(channelId);
}

init();
</script>
</body>
</html>
